org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# 国内镜像配置
systemProp.mavenCentralUrl=https://maven.aliyun.com/repository/central
systemProp.googleUrl=https://maven.aliyun.com/repository/google
systemProp.gradlePluginUrl=https://maven.aliyun.com/repository/gradle-plugin

