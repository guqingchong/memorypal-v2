name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FLUTTER_VERSION: '3.19.6'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK
        run: sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Set Flutter environment
        run: |
          echo "FLUTTER_ROOT=${{ env.FLUTTER_ROOT }}" >> $GITHUB_ENV
          echo "FLUTTER_HOME=${{ env.FLUTTER_ROOT }}" >> $GITHUB_ENV
          flutter config --no-analytics
        shell: bash

      - name: Clean project
        run: flutter clean

      - name: Get dependencies
        run: |
          flutter pub get || echo "Warning: pub get had issues but continuing..."

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug --verbose
          else
            flutter build apk --release --verbose
          fi
        shell: bash

      - name: Check output files
        run: |
          echo "=== Build output files ==="
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "Directory not found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: memorypal-apk-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/*.apk
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
