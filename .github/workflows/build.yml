name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FLUTTER_VERSION: '3.19.6'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test || true

      - name: Build APK (Release)
        if: github.event.inputs.build_type != 'debug'
        run: flutter build apk --release

      - name: Build APK (Debug)
        if: github.event.inputs.build_type == 'debug'
        run: flutter build apk --debug

      - name: Rename APK with version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/memorypal-v2-${VERSION}.apk 2>/dev/null || \
          cp build/app/outputs/flutter-apk/app-debug.apk output/memorypal-v2-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: memorypal-apk-${{ github.run_number }}
          path: output/*.apk
          retention-days: 30

      - name: Upload to GitHub Releases
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: output/*.apk
          tag_name: v0.1.0+${{ github.run_number }}
          name: MemoryPal v0.1.0+${{ github.run_number }}
          draft: true
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
