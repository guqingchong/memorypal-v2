name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FLUTTER_VERSION: '3.19.6'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK
        run: sdkmanager "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Fix Android embedding
        run: |
          echo "=== Checking AndroidManifest.xml ==="
          cat android/app/src/main/AndroidManifest.xml

          echo "=== Ensuring flutterEmbedding v2 ==="
          # 确保 meta-data 存在且正确
          if ! grep -q 'android:name="flutterEmbedding"' android/app/src/main/AndroidManifest.xml; then
            echo "Adding flutterEmbedding meta-data"
            sed -i 's|</application>|    <meta-data\n            android:name="flutterEmbedding"\n            android:value="2" />\n    </application>|' android/app/src/main/AndroidManifest.xml
          fi

          echo "=== Fixed AndroidManifest.xml ==="
          cat android/app/src/main/AndroidManifest.xml

      - name: Clean project
        run: |
          flutter clean
          rm -rf android/.gradle android/app/build

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="release"
          fi
          echo "Building $BUILD_TYPE..."
          if [ "$BUILD_TYPE" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
        shell: bash
        env:
          # 禁用 embedding 版本检查
          SUPPRESS_EMBEDDING_WARNING: "true"

      - name: Check output files
        run: |
          echo "=== Build output files ==="
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "Directory not found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: memorypal-apk-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/*.apk
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
